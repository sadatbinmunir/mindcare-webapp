<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="login-page">
    <div class="login-box">
      <div class="login-logo">💚 MindCare</div>
      <h1>Welcome Back</h1>
      <p>Continue your wellness journey</p>

      <input type="email" id="email" placeholder="your@email.com">
      <input type="password" id="password" placeholder="Enter your password">

      <button onclick="loginUser()">Login</button>

      <p class="small-text">Don't have an account? <a href="register.html">Create an Account</a></p>
      </p>
    </div>
  </section>
  <div class="emergency-button" onclick="showEmergencyHelp()">
  Emergency Help
</div>

  <script src="script.js"></script>
</body>
</html>
