<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindCare - Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">💚 MindCare</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="mood.html">Mood</a>
      <a href="chat.html" class="active">Chat</a>
      <a href="specialists.html">Specialists</a>
      <a href="journal.html">Journal</a>
      <a href="index.html">Logout</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Chat Companion</h1>
    <p>A safe space to express how you feel.</p>
  </section>

  <section class="chat-container">
    <div id="chatBox" class="chat-box">
      <p><strong>Bot:</strong> Hello. I'm here to listen and support you. How are you feeling today?</p>
    </div>

    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Type your message here...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </section>

  <div class="emergency-button" onclick="showEmergencyHelp()">
  Emergency Help
</div>

  <script src="script.js"></script>
</body>
</html>
